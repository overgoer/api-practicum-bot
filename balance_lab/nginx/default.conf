# Host-Based Routing Demo — nginx as load balancer
# Users send requests with different Host: headers
# and get routed to different backends.

upstream backend1 {
    server backend1:9001;
}

upstream backend2 {
    server backend2:9002;
}

upstream backend3 {
    server backend3:9003;
}

server {
    listen 8080;
    server_name api.balance.local;

    location / {
        proxy_pass http://backend1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
    }
}

server {
    listen 8080;
    server_name app.balance.local;

    location / {
        proxy_pass http://backend2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
    }
}

server {
    listen 8080;
    server_name admin.balance.local;

    location / {
        proxy_pass http://backend3;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
    }
}

server {
    listen 8080 default_server;
    return 404;
}
